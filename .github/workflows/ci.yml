name: CI - Hakesa Tests & Quality

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # 1. LINTING - Code Style Check
  # ============================================
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Laravel Pint
        run: vendor/bin/pint --test

  # ============================================
  # 2. UNIT TESTS
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, pdo_pgsql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Unit Tests
        run: vendor/bin/pest --testsuite=Unit

  # ============================================
  # 3. FEATURE TESTS
  # ============================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, pdo_pgsql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        run: php artisan migrate --force

      - name: Seed database
        run: php artisan db:seed --force

      - name: Run Feature Tests
        run: vendor/bin/pest --testsuite=Feature

  # ============================================
  # 4. SECURITY - PHP CS Fixer
  # ============================================
  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP Security Checker
        run: |
          # Check for common security issues
          echo "Checking for sensitive data in codebase..."
          if grep -r "password\s*=" --include="*.php" . 2>/dev/null | grep -v "Hash::make\|bcrypt\|env(" | head -5; then
            echo "Warning: Check for hardcoded passwords!"
          fi

      - name: Analyze Composer dependencies
        run: composer audit --no-interaction || true

  # ============================================
  # 5. STATIC ANALYSIS (Optional)
  # ============================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    if: false # Disable if no psalm/phpstan installed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan (if available)
        run: vendor/bin/phpstan analyse --memory-limit=512M || echo "PHPStan not configured"

  # ============================================
  # 6. JS/CSS BUILD
  # ============================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vite Build
        run: npm run build

      - name: Verify build output
        run: test -d public/build && echo "Build successful" || exit 1